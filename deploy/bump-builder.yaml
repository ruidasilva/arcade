# BUMP Builder Deployment
#
# Consumes merkle proof events, builds BUMP proofs for mined transactions.
#
# As of the microservice decomposition, this pod NO LONGER runs the
# block-processing watchdog — that responsibility moved to its own
# pod. See deploy/watchdog.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcade-bump-builder
  namespace: arcade
  labels:
    app.kubernetes.io/name: bump-builder
    app.kubernetes.io/part-of: arcade
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bump-builder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bump-builder
        app.kubernetes.io/part-of: arcade
    spec:
      containers:
        - name: arcade
          image: ghcr.io/bsv-blockchain/arcade:latest
          args: ["--mode", "bump-builder"]
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          env:
            - name: ARCADE_KAFKA_BROKERS
              value: "kafka-0.kafka.arcade.svc.cluster.local:9092"
            - name: ARCADE_AEROSPIKE_HOSTS
              value: "aerospike-0.aerospike.arcade.svc.cluster.local:3000"
            - name: ARCADE_AEROSPIKE_NAMESPACE
              value: "arcade"
            # Talk to the chaintracks pod over HTTP instead of running an
            # embedded ChainManager + upstream header poller in this pod.
            # The chaintracks Service exposes /chaintracks/v1/* on 8083.
            - name: ARCADE_CHAINTRACKS_MODE
              value: "remote"
            - name: ARCADE_CHAINTRACKS_URL
              value: "http://chaintracks.arcade.svc.cluster.local:8083"
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
